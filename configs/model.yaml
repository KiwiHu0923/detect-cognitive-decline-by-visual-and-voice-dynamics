# Whisper — supporting role (task-region segmentation only)
whisper:
  model: mlx-community/whisper-base-mlx
  word_timestamps: true

# Phonation channel — sustained vowels, Parselmouth
phonation:
  f0_floor_hz: 75         # standard adult male floor
  f0_ceiling_hz: 500      # standard adult female ceiling
  min_voicing_seconds: 1.0  # guardrail: skip files with less than this continuously-voiced
  jitter_period_floor_s: 0.0001
  jitter_period_ceiling_s: 0.02
  jitter_max_period_factor: 1.3
  jitter_max_amplitude_factor: 1.6
  # Steady-state window (Day 4). Praat jitter/shimmer/HNR are only valid on
  # quasi-periodic, stable-pitch regions; onset/offset transients inflate them
  # in both PD and HC, diluting discrimination. Crop to the middle 60% before
  # analysis. Short-clip guard: skip cropping if duration is below the floor.
  apply_steady_window: true
  steady_window_frac: 0.6
  steady_window_min_duration_s: 0.5
  # Vowel filter + per-vowel aggregation (Day 4, 2026-07-10). Aggregation unit
  # of analysis: per-subject × per-vowel (mean of reps: I1/I2/I3 → mean /i/).
  # Cross-vowel combination: AUC-excess weighted average using paper priors.
  # Fixes a Day 2 bug where BALANCED_VOWEL_SET = (A1, A2, I1, O2, U1) treated
  # A1 and A2 (both reps of /a/) as separate tasks, double-counting /a/.
  included_vowels: [I, O, U]
  vowel_weights:
    # AUC-excess = Person AUC - 0.5, from Li et al. arxiv 2606.19125 Table IV.
    # Paper Person AUCs: [a]=0.58, [e]=0.63, [i]=0.77, [o]=0.77, [u]=0.83.
    # Excess after dropping [a]/[e]: I=0.27, O=0.27, U=0.33. Sum=0.87. Renormalize.
    I: 0.310
    O: 0.310
    U: 0.379
  vowel_weights_source: "Li et al. arxiv 2606.19125 Table IV Person AUC (NeuroVoz)"

# Articulation / DDK channel — /pa-ta-ka/ (PATAKA), intensity-envelope peak picking
ddk:
  envelope_smoothing_ms: 20     # low-pass window on rectified envelope
  peak_min_prominence: 0.15     # relative to envelope max
  peak_min_isi_s: 0.05          # 20 Hz cap — anything faster is not a syllable
  amplitude_decrement_min_peaks: 8  # need ≥ this many peaks to fit slope

# Late fusion — score-level weighted vote
# Weights renormalize over channels that are present (N/A channels drop out).
#
# Derivation (2026-07-09): weights follow the AUC-excess-over-chance heuristic
# w_c ∝ max(0, AUC_c − 0.5), computed from Day 3 subject-level LOSO on NeuroVoz:
#   phonation (per-file training, per-subject eval) AUC = 0.630 → excess 0.130
#   DDK-only AUC = 0.740 → excess 0.240
#   → phonation 0.130/0.370 = 0.35, DDK 0.240/0.370 = 0.65
# facial 0.15 held from CLAUDE.md scope until Day 4 provides its own LOSO number.
fusion:
  weights:
    phonation: 0.35
    ddk: 0.65
    facial: 0.15
  agreement_threshold: 0.30    # per-channel probs within this → agreement flag = true

# Cohort definition (NeuroVoz) — HC actively filtered by age for strict matching
# (PD floor is 41; 4 HC subjects sit below 50 or have missing age).
# Raw age-matched cohort: 53 PD × 51 HC. Analysis cohort further intersects with
# subjects that have both PATAKA and ≥1 vowel file → ≈ 49 PD × 46 HC.
cohort:
  pd_n: 53
  hc_age_min: 50              # 51 HC survive; PD range 41–88, HC range 53–86
  require_task_intersection: [PATAKA]   # subject must also have ≥1 vowel file

# Claude report layer
claude:
  model: claude-opus-4-7
  max_tokens: 2048
  prompt_caching: true
